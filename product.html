<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenden - Products</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <!-- Navbar -->
    <nav class="bg-green-100 p-3 flex justify-between shadow-xl sticky top-0 z-10">

        <h1 class="text-2xl">Greenden</h1>

        <span id="menuicon" class="cursor-pointer text-2xl md:hidden">☰</span>

        <ul class="flex gap-5 text-gray-600">
            <li><a href="index.html" class="hover:underline">Home</a></li>
            <li><a href="#" class="hover:underline text-black">Products</a></li>
            <li><a href="contact.html" class="hover:underline">Contact</a></li>
        </ul>
    </nav>
    <!--side nav bar-->
    <section id="sidenav" class="bg-green-100 fixed z-20 top-0  transition-all duration-1000"
        style="width: 50%;height: 100vh; right: -50%;">
        <div class="text-right p-5">
            <p id="closenav" class="inline cursor-pointer">X</p>
        </div>
        <ul class="flex flex-col gap-10 items-center text-gray-600">
            <li>
                <a class="hover:underline text-black" href="index.html">Home</a>
            </li>
            <li>
                <a class="hover:underline hover:text-black" href="product.html">Products</a>
            </li>
            <li>
                <a class="hover:underline hover:text-black" href="contact.html">Contact</a>
            </li>


        </ul>
    </section>

    <!-- Search Section -->
    <section class="p-5 text-center">
        <h1 class="text-3xl font-bold mb-4">Our Plants</h1>

        <input id="search" type="text" placeholder="Search for plants..."
            class="border border-gray-400 p-2 w-3/4 md:w-1/2 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
    </section>

    <!-- Products Grid -->
    <section class="p-5">
        <div id="product-container" class="grid grid-cols-2 md:grid-cols-3 gap-6">

            <!-- Product 1 -->
            <div class="text-center">
                <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=600&q=80"
                    class="w-full h-56 object-cover rounded-lg hover:shadow-xl hover:-translate-y-2 transition"
                    alt="Aloe Vera">
                <h2 class="mt-2 font-semibold">Aloe Vera</h2>
                <p>$15</p>
            </div>

            <!-- Product 2 -->
            <div class="text-center">
                <img src="https://images.unsplash.com/photo-1593691509543-c55fb32d8de5?auto=format&fit=crop&w=600&q=80"
                    class="w-full h-56 object-cover rounded-lg hover:shadow-xl hover:-translate-y-2 transition"
                    alt="Snake Plant">
                <h2 class="mt-2 font-semibold">Snake Plant</h2>
                <p>$18</p>
            </div>

            <!-- Product 3 -->
            <div class="text-center">

                <img src="https://images.unsplash.com/photo-1598880940080-ff9a29891b85?auto=format&fit=crop&w=600&q=80"
                    class="w-full h-56 object-cover rounded-lg hover:shadow-xl hover:-translate-y-2 transition"
                    alt="Peace Lily">
                <h2 class="mt-2 font-semibold">Peace Lily</h2>
                <p>$20</p>
            </div>

            <!-- Product 4 -->
            <div class="text-center">
                <img src="https://images.unsplash.com/photo-1614594975525-e45190c55d0b?auto=format&fit=crop&w=600&q=80"
                    class="w-full h-56 object-cover rounded-lg hover:shadow-xl hover:-translate-y-2 transition"
                    alt="Fiddle Leaf">
                <h2 class="mt-2 font-semibold">Fiddle Leaf Fig</h2>
                <p>$25</p>
            </div>

            <!-- Product 5 -->
            <div class="text-center">
                <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=600&q=80"
                    class="w-full h-56 object-cover rounded-lg hover:shadow-xl hover:-translate-y-2 transition"
                    alt="Cactus">
                <h2 class="mt-2 font-semibold">Cactus</h2>
                <p>$12</p>
            </div>

            <!-- Product 6 -->
            <div class="text-center">
                <img src="https://images.unsplash.com/photo-1604762524889-3e2fcc145683?auto=format&fit=crop&w=600&q=80"
                    class="w-full h-56 object-cover rounded-lg hover:shadow-xl hover:-translate-y-2 transition"
                    alt="Money Plant">
                <h2 class="mt-2 font-semibold">Money Plant</h2>
                <p>$17</p>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <section class="bg-green-100 p-10 text-center mt-10">
        <h1 class="text-3xl font-bold">Greenden</h1>
        <p class="mt-2">Bring nature closer to your home 🌿</p>
    </section>

    <script src="product.js"></script>

</body>

</html>
